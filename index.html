<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — AI Productivity Coach</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0f;
  color: white;
}

#messages {
  height: 80vh;
  overflow-y: auto;
  padding: 20px;
}

.msg { margin-bottom: 15px; }
.user { text-align: right; }
.bot { text-align: left; }

.bubble {
  display: inline-block;
  padding: 10px 14px;
  border-radius: 10px;
  max-width: 70%;
}

.user .bubble { background: #1e1e2e; }
.bot .bubble { background: #141420; }

#input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #333;
}

#chat-input {
  flex: 1;
  padding: 10px;
  background: #111;
  border: none;
  color: white;
}

button {
  padding: 10px;
  background: cyan;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="messages"></div>

<div id="input-area">
  <input id="chat-input" placeholder="Ask your AI productivity coach..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const SYSTEM_PROMPT = `You are APEX, an AI Productivity Optimization Coach.
Give actionable, practical advice.
Keep responses clear and helpful.`;

let conversationHistory = [];
let isTyping = false;

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  div.appendChild(bubble);
  document.getElementById("messages").appendChild(div);

  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}

async function sendMessage() {
  if (isTyping) return;

  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text) return;

  addMessage("user", text);
  conversationHistory.push({ role: "user", content: text });

  input.value = "";

  isTyping = true;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: conversationHistory,
        system: SYSTEM_PROMPT
      })
    });

    const data = await res.json();

    const reply =
      data.content?.[0]?.text || "⚠️ No response from AI";

    addMessage("bot", reply);
    conversationHistory.push({ role: "assistant", content: reply });

  } catch (err) {
    addMessage("bot", "⚠️ Server error");
  }

  isTyping = false;
}

document.getElementById("chat-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});

// Welcome message
addMessage("bot", "Hello! I'm APEX 🚀\nWhat’s your biggest productivity challenge?");
</script>

</body>
</html>
