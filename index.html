<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — AI Productivity Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #7b2fff;
    --accent3: #ff6b35;
    --text: #e8e8f0;
    --text-muted: #6b6b88;
    --user-bubble: #1e1e2e;
    --bot-bubble: #141420;
    --glow: rgba(0, 229, 255, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 400px; height: 400px; background: rgba(123,47,255,0.12); top: -100px; right: -100px; }
  .orb-2 { width: 300px; height: 300px; background: rgba(0,229,255,0.08); bottom: 0; left: -50px; animation-delay: -6s; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.1); }
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #000;
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse-dot 2s ease infinite;
  }

  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* METRICS BAR */
  .metrics-bar {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .metric {
    flex: 1;
    background: var(--surface);
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: default;
    transition: background 0.2s;
  }

  .metric:hover { background: var(--surface2); }

  .metric-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .metric-value {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  .metric-value.orange { color: var(--accent3); }
  .metric-value.purple { color: var(--accent2); }

  /* MAIN LAYOUT */
  .main {
    flex: 1;
    display: flex;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 0 16px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .focus-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 6px;
    color: var(--text-muted);
  }

  .focus-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .focus-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.08);
  }

  .focus-chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .productivity-ring {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
  }

  .ring-container {
    position: relative;
    width: 90px; height: 90px;
  }

  .ring-container svg {
    transform: rotate(-90deg);
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
  }

  .ring-pct {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .ring-sub {
    font-size: 8px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .ring-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 14px;
    max-width: 760px;
    animation: msg-in 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 800;
  }

  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    box-shadow: 0 0 16px rgba(0,229,255,0.25);
  }

  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 16px;
  }

  .msg-body { flex: 1; }

  .msg-meta {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.08em;
  }

  .msg.user .msg-meta { text-align: right; }

  .bubble {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 600px;
  }

  .msg.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(0,229,255,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
    margin-left: auto;
  }

  .bubble strong {
    color: var(--accent);
    font-weight: 600;
  }

  .bubble em {
    color: var(--accent2);
    font-style: normal;
    font-weight: 600;
  }

  .insight-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    width: fit-content;
  }

  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: bounce 1.2s ease infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* QUICK PROMPTS */
  .quick-prompts {
    padding: 12px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.5);
  }

  .qp-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .qp-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.06);
  }

  /* INPUT AREA */
  .input-area {
    padding: 16px 32px 20px;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: rgba(0,229,255,0.4);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.06);
  }

  #chat-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.5;
  }

  #chat-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 14px rgba(0,229,255,0.3);
  }

  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 22px rgba(0,229,255,0.5);
  }

  .send-btn:active { transform: scale(0.96); }

  .send-btn svg { width: 16px; height: 16px; fill: #000; }

  .input-hint {
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
  }

  /* Scrollbar for sidebar */
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  /* Welcome screen */
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 500px;
    margin: 0 auto;
  }

  .welcome-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .metrics-bar .metric:nth-child(3),
    .metrics-bar .metric:nth-child(4) { display: none; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
    .quick-prompts { padding: 10px 16px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">APX</div>
    <div>
      <div class="logo-text">APEX</div>
      <div class="logo-sub">Productivity Intelligence</div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span>AI COACH ONLINE</span>
  </div>
</header>

<!-- METRICS BAR -->
<div class="metrics-bar">
  <div class="metric">
    <span class="metric-label">Focus Score</span>
    <span class="metric-value" id="focus-score">78</span>
  </div>
  <div class="metric">
    <span class="metric-label">Tasks Done</span>
    <span class="metric-value orange" id="tasks-done">12</span>
  </div>
  <div class="metric">
    <span class="metric-label">Flow State</span>
    <span class="metric-value purple" id="flow-state">2.4h</span>
  </div>
  <div class="metric">
    <span class="metric-label">Streak</span>
    <span class="metric-value" id="streak">7d 🔥</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Focus Mode</div>
      <div class="focus-chip active" onclick="setFocus(this,'Deep Work')">
        <span class="focus-chip-dot"></span> Deep Work
      </div>
      <div class="focus-chip" onclick="setFocus(this,'Planning')">
        <span class="focus-chip-dot"></span> Planning
      </div>
      <div class="focus-chip" onclick="setFocus(this,'Review')">
        <span class="focus-chip-dot"></span> Review
      </div>
      <div class="focus-chip" onclick="setFocus(this,'Break')">
        <span class="focus-chip-dot"></span> Break
      </div>
    </div>

    <div class="productivity-ring">
      <div class="sidebar-title">Daily Progress</div>
      <div class="ring-container">
        <svg viewBox="0 0 90 90" width="90" height="90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#1a1a24" stroke-width="8"/>
          <circle cx="45" cy="45" r="38" fill="none" stroke="url(#ringGrad)" stroke-width="8"
            stroke-dasharray="239" stroke-dashoffset="52" stroke-linecap="round"/>
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#00e5ff"/>
              <stop offset="100%" stop-color="#7b2fff"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">78%</span>
          <span class="ring-sub">DONE</span>
        </div>
      </div>
      <div class="ring-title">Goal Completion</div>
    </div>
  </aside>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Quick Prompts -->
    <div class="quick-prompts" id="quick-prompts">
      <button class="qp-btn" onclick="sendQuick('Analyze my focus patterns')">📊 Analyze my patterns</button>
      <button class="qp-btn" onclick="sendQuick('Give me a deep work routine')">⚡ Deep work routine</button>
      <button class="qp-btn" onclick="sendQuick('How can I reduce distractions?')">🎯 Reduce distractions</button>
      <button class="qp-btn" onclick="sendQuick('Create a productivity plan for today')">📋 Plan my day</button>
      <button class="qp-btn" onclick="sendQuick('Tips for beating procrastination')">🚀 Beat procrastination</button>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" rows="1" placeholder="Ask your AI productivity coach…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">⌘ + Enter to send · Powered by Claude AI</div>
    </div>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are APEX, an elite AI Productivity Optimization Coach. Your role is to analyze productivity patterns and provide personalized, actionable coaching.

Your personality:
- Data-driven but human: You back advice with science and frameworks but speak warmly
- Direct and specific: No vague advice — always give concrete, step-by-step guidance
- Pattern-aware: You notice habits, suggest optimizations, and track progress themes
- Motivating without being toxic: Honest, not relentlessly positive

Your capabilities:
- Analyze productivity patterns (focus blocks, energy rhythms, distraction triggers)
- Design personalized deep work schedules
- Coach on time-blocking, Pomodoro, GTD, Eat the Frog, etc.
- Help beat procrastination with neuroscience-backed techniques
- Optimize morning/evening routines
- Suggest tools and systems for task management

Response style:
- Use **bold** for key terms or important points
- Use bullet points for action steps
- Keep responses focused — not too long
- Occasionally ask a follow-up question to understand the user's patterns better
- Reference productivity research (e.g., Cal Newport, Cal Newport's Deep Work, Huberman Lab, etc.) when relevant

Start conversations by briefly introducing yourself and asking about the user's current biggest productivity challenge.`;

let conversationHistory = [];
let isTyping = false;
let currentFocus = 'Deep Work';

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if ((e.key === 'Enter' && !e.shiftKey) || (e.key === 'Enter' && e.metaKey)) {
    e.preventDefault();
    sendMessage();
  }
}

function setFocus(el, mode) {
  document.querySelectorAll('.focus-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFocus = mode;
}

function sendQuick(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function addMessage(role, content, animate = true) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animationDuration = '0s';

  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  if (role === 'bot') {
    div.innerHTML = `
      <div class="msg-avatar">APX</div>
      <div class="msg-body">
        <div class="msg-meta">APEX · ${time}</div>
        <div class="bubble">${formatContent(content)}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div class="msg-body">
        <div class="msg-meta">${time} · You</div>
        <div class="bubble">${escapeHtml(content)}</div>
      </div>`;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function formatContent(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^• (.*)/gm, '<li>$1</li>')
    .replace(/^- (.*)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul style="margin: 8px 0 8px 16px; display:flex; flex-direction:column; gap:4px;">$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">APX</div>
    <div class="msg-body">
      <div class="msg-meta">APEX is analyzing…</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isTyping = true;
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || "I'm having trouble connecting right now. Please try again.";
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);

    // Update fake metrics for fun
    updateMetrics();

  } catch (err) {
    removeTyping();
    addMessage('bot', "⚠️ Unable to reach the AI engine. Please check your connection and try again.");
  }

  isTyping = false;
}

function updateMetrics() {
  // Subtle random metric updates to simulate live tracking
  const score = document.getElementById('focus-score');
  const curr = parseInt(score.textContent);
  const delta = Math.floor(Math.random() * 5) - 2;
  score.textContent = Math.max(40, Math.min(99, curr + delta));
}

// Init welcome message
window.addEventListener('load', () => {
  const welcomeHTML = `<div class="insight-tag">⚡ SESSION STARTED · FOCUS: Deep Work</div>
Hello! I'm <strong>APEX</strong> — your AI Productivity Optimization Coach.

I analyze your work patterns and deliver personalized coaching to help you enter flow states faster, eliminate friction, and consistently hit peak performance.

To get started: <em>What's your biggest productivity challenge right now?</em> (Procrastination? Distractions? Energy crashes? Poor planning?)`;

  conversationHistory.push({
    role: 'assistant',
    content: welcomeHTML.replace(/<[^>]*>/g, '')
  });

  addMessage('bot', welcomeHTML, false);
});
</script>
</body>
</html>
